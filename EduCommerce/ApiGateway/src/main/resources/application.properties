spring.application.name=API-GATEWAY
server.port=8080

# ==================== CONFIG SERVER ====================
# Gateway fetches its config from Config Server
spring.config.import=optional:configserver:http://localhost:8888

# ==================== JWT SECRET ====================
# In production use environment variable: export JWT_SECRET=your_secret
jwt.secret=${JWT_SECRET:educommerce-super-secret-jwt-key-2024-secure}

# ==================== GATEWAY ROUTES ====================

# Route 1: Auth endpoints - NO JWT filter (login/register are public)
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Route 2: Student Service - JWT protected
spring.cloud.gateway.routes[1].id=student-route
spring.cloud.gateway.routes[1].uri=lb://STUDENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/students/**,/courses/**,/enroll/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthFilter

# Route 3: Attendance Service - JWT protected
spring.cloud.gateway.routes[2].id=attendance-route
spring.cloud.gateway.routes[2].uri=lb://ATTENDANCE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/attendance/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthFilter

# Route 4: Result Service - JWT protected
spring.cloud.gateway.routes[3].id=result-route
spring.cloud.gateway.routes[3].uri=lb://RESULT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/results/**
spring.cloud.gateway.routes[3].filters[0]=JwtAuthFilter

# ==================== EUREKA ====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ==================== ZIPKIN TRACING ====================
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=*
