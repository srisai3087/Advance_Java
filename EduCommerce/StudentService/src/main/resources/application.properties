spring.application.name=student-service
server.port=8081

# Fetch config from Config Server first
spring.config.import=optional:configserver:http://localhost:8888

# ==================== MYSQL ====================
spring.datasource.url=jdbc:mysql://localhost:3306/studentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Sai@2003

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== JWT ====================
# Use environment variable in production: export JWT_SECRET=your_secret
jwt.secret=${JWT_SECRET:educommerce-super-secret-jwt-key-2024-secure}
jwt.expiration=86400000

# ==================== EUREKA ====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ==================== ZIPKIN ====================
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=*
